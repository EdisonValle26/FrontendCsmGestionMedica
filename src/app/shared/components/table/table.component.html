<div class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full">
        <thead class="bg-gray-50">
            <tr>
                <th *ngFor="let col of columns" class="p-3 text-left text-sm text-gray-600">
                    {{ col.label }}
                </th>
                <th class="p-3 text-center">
                    Acciones
                </th>
            </tr>
        </thead>
        <tbody>
            <!-- LOADING -->
            <tr *ngIf="loading">
                <td colspan="100%" class="text-center p-6">
                    Cargando...
                </td>
            </tr>
            <!-- EMPTY -->
            <tr *ngIf="!loading && data.length === 0">
                <td colspan="100%" class="text-center p-6 text-gray-400">
                    No hay datos
                </td>
            </tr>
            <!-- ROWS -->
            <tr *ngFor="let row of data" class="border-t hover:bg-gray-50">
                <td *ngFor="let col of columns" class="p-3">
                    <!-- FORMAT -->
                    <ng-container *ngIf="col.format">
                        {{ col.format(row[col.field]) }}
                    </ng-container>
                    <!-- TEXT -->
                    <ng-container *ngIf="!col.format && col.type !== 'badge'">
                        {{ row[col.field] }}
                    </ng-container>
                    <!-- BADGE -->
                    <span *ngIf="col.type === 'badge'" class="px-2 py-1 text-xs rounded-full" [ngClass]="{
                            'bg-yellow-100 text-yellow-600': row[col.field] === 'pendiente',
                            'bg-green-100 text-green-600': row[col.field] === 'confirmada',
                            'bg-red-100 text-red-600': row[col.field] === 'urgente'
                        }">
                        {{ row[col.field] }}
                    </span>
                </td>
                <!-- ACTIONS -->
                <td class="p-3 text-center space-x-3">
                    <button (click)="view.emit(row)">
                        <i class="fa-solid fa-eye" style="color: rgb(69, 192, 120)"></i>
                    </button>
                    <button (click)="edit.emit(row)">
                        <i class="fa-solid fa-pen-to-square" style="color: rgb(19, 142, 241)"></i>
                    </button>
                    <button (click)="delete.emit(row.id)">
                        <i class="fa-solid fa-trash-can" style="color: rgb(192, 6, 6)"></i>
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
    <!-- PAGINACIÓN -->
    <div class="flex flex-col md:flex-row items-center justify-between gap-4 p-4 border-t bg-gray-50">
        <!-- INFO -->
        <div class="text-sm text-gray-500">
            Mostrando página
            <span class="font-semibold">{{ page }}</span>
            de
            <span class="font-semibold">
                {{ totalPages }}
            </span>
            | Total registros:
            <span class="font-semibold">
                {{ total }}
            </span>
        </div>
        <!-- CONTROLES -->
        <div class="flex items-center gap-3">
            <!-- TAKE -->
            <select [value]="take" (change)="changeTake($event)" class="border rounded-lg px-3 py-2 text-sm">
                <option *ngFor="let option of takeOptions" [value]="option">
                    {{ option }}
                </option>
            </select>
            <!-- PREV -->
            <button (click)="prevPage()" [disabled]="page === 1"
                class="px-4 py-2 border rounded-lg disabled:opacity-50">
                Anterior
            </button>
            <!-- PAGE -->
            <div class="px-3 py-2 text-sm font-semibold">
                {{ page }}
            </div>
            <!-- NEXT -->
            <button (click)="nextPage()" [disabled]="page >= totalPages"
                class="px-4 py-2 border rounded-lg disabled:opacity-50">
                Siguiente
            </button>
        </div>
    </div>
</div>
