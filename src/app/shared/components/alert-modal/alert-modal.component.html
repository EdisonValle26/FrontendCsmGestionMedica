<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center">

  <!-- OVERLAY -->
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" (click)="closeModal()">
  </div>

  <!-- MODAL -->
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 animate-scaleIn">

    <!-- ICON -->
    <div class="flex justify-center mb-4">
      <i class="fa-solid text-4xl" [ngClass]="getIcon()"></i>
    </div>

    <!-- TITLE -->
    <h2 class="text-xl font-bold text-center mb-2">
      {{ title }}
    </h2>

    <!-- MESSAGE -->
    <p class="text-gray-600 text-center mb-6">
      {{ message }}
    </p>

    <!-- ACTIONS -->
    <div class="flex justify-center gap-4">

      <app-button variant="cancel" (click)="closeModal()">
        Cancelar
      </app-button>

      <app-button variant="primary" (click)="confirmAction()">
        Aceptar
      </app-button>

    </div>

  </div>

</div>
