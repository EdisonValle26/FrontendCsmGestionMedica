<div class="fixed top-5 right-5 z-50 space-y-3 w-80">

    <div *ngFor="let alert of alerts" class="transition-all duration-300" [ngClass]="{
        'animate-slideIn': alert.state === 'enter',
        'animate-slideOut': alert.state === 'exit'
    }">
        <app-alert [type]="alert.type" [message]="alert.message">
        </app-alert>
    </div>

</div>
