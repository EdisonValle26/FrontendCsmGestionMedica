<div *ngIf="open" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
    <!-- MODAL -->
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl flex flex-col max-h-[90vh] animate-fadeIn">
        <!-- HEADER -->
        <div class="flex justify-between items-center p-5 border-b">
            <h2 class="text-xl font-bold text-gray-800">
                {{ title }}
            </h2>
            <button (click)="close.emit()" class="text-gray-400 hover:text-red-500 transition text-lg">
                ✖
            </button>
        </div>
        <!-- BODY -->
        <div class="flex-1 overflow-y-auto p-5">
            <ng-content></ng-content>
        </div>
    </div>
</div>
