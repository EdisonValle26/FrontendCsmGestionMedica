<form [formGroup]="form" (ngSubmit)="submit()" class="space-y-3">

    <div *ngFor="let field of fields">

        <label class="text-sm text-gray-600">{{ field.label }}</label>

        <!-- TEXT -->
        <input *ngIf="field.type === 'text'" [formControlName]="field.name" [placeholder]="field.placeholder || ''"
            (input)="onInput($event, field)" [attr.maxLength]="field.maxLength || null" [ngClass]="{
                'bg-gray-100 text-gray-500 cursor-not-allowed': mode === 'view'
                }"
            class="w-full border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 p-2 rounded-lg transition" />

        <!-- PASSWORD -->
        <div *ngIf="field.type === 'password'" class="relative">

            <input [type]="showPassword ? 'text' : 'password'" [formControlName]="field.name"
                [placeholder]="field.placeholder || ''" [ngClass]="{
                'bg-gray-100 text-gray-500 cursor-not-allowed': mode === 'view'
                }"
                class="w-full border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 p-2 pr-10 rounded-lg transition" />
            <button *ngIf="mode === 'create'" type="button" (click)="showPassword = !showPassword"
                class="absolute right-3 top-3/4 -translate-y-1/2 text-gray-500 hover:text-blue-600">
                <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'">
                </i>
            </button>

        </div>
        <!-- TEXT AREA -->
        <textarea *ngIf="field.type === 'textarea'" [formControlName]="field.name "
            [placeholder]="field.placeholder || ''" (input)="onInput($event, field)"
            [attr.maxLength]="field.maxLength || null"
            [ngClass]="{'bg-gray-100 text-gray-500 cursor-not-allowed': mode === 'view'}"
            class="w-full border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 p-2 rounded-lg transition">
        </textarea>

        <!-- DATE -->
        <input *ngIf="field.type === 'date'" type="date" [formControlName]="field.name"
            [ngClass]="{'bg-gray-100 text-gray-500 cursor-not-allowed': mode === 'view'}"
            class="w-full border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 p-2 rounded-lg transition" />

        <!-- TIME -->
        <input *ngIf="field.type === 'time'" type="time" [formControlName]="field.name"
            [ngClass]="{'bg-gray-100 text-gray-500 cursor-not-allowed': mode === 'view'}"
            class="w-full border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 p-2 rounded-lg transition" />

        <!-- SELECT -->
        <select *ngIf="field.type === 'select'" [formControlName]="field.name" (change)="onFieldChange(field, $event)"
            [ngClass]="{
            'bg-gray-100 text-gray-500 cursor-not-allowed':
            mode === 'view'
            }" class="w-full border border-gray-300 focus:border-blue-500
            focus:ring-2 focus:ring-blue-200 p-2 rounded-lg transition">
            <option *ngFor="let opt of field.options" [value]="opt.value">
                {{ opt.label }}
            </option>
        </select>
        <!-- PREVIEW ICON -->
        <div *ngIf="field.name === 'icon' && form.get('icon')?.value" class="mt-3 flex justify-center">
            <div class="flex items-center gap-3 bg-gray-100 px-4 py-3 rounded-xl">
                <i [class]="'fas fa-' + form.get('icon')?.value" class="text-3xl text-blue-500"></i>
                <span class="text-sm text-gray-600">
                    Vista previa del icono
                </span>
            </div>
        </div>


        <!-- ERROR -->
        <div *ngIf="form.get(field.name)?.invalid && form.get(field.name)?.touched" class="text-red-500 text-xs mt-1">

            <div *ngIf="form.get(field.name)?.errors?.['required']">
                Campo requerido
            </div>

            <div *ngIf="form.get(field.name)?.errors?.['email']">
                Correo inválido
            </div>

            <div *ngIf="form.get(field.name)?.errors?.['minlength']">
                Mínimo
                {{ field.minLength }}
                caracteres
            </div>

            <div *ngIf="form.get(field.name)?.errors?.['maxlength']">
                Máximo
                {{ field.maxLength }}
                caracteres
            </div>

            <div *ngIf="form.get(field.name)?.errors?.['pattern']">
                Formato inválido
            </div>

        </div>

    </div>

    <div *ngIf="mode !== 'view'" class="flex justify-center pt-2">
        <app-button type="submit" variant="primary" customClass="w-full flex items-center justify-center">
            Guardar
        </app-button>
    </div>

</form>
