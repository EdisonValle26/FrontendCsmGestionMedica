<div class="h-full min-h-0 flex flex-col p-2 gap-2 overflow-hidden">

  <div class="flex justify-between items-center mb-2">
      <h1 class="text-2xl font-bold">Gestión de Doctores</h1>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex justify-center items-center py-12">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
  </div>

  <div *ngIf="!loading" class="flex-1 min-h-0 overflow-y-auto">

    <!-- FILTROS -->
    <app-filters
      [filters]="filtersConfig"
      (filterChange)="onFilter($event)">
    </app-filters>

    <!-- TABLA -->
    <app-table
      [data]="doctors"
      [columns]="columns"
      [loading]="loading"
      [total]="totalDoctors"
      [page]="page"
      [take]="take"
      [takeOptions]="takeOptions"
      (pageChange)="onPageChange($event)"
      (takeChange)="onTakeChange($event)"
      (view)="onView($event)"
      (edit)="onEdit($event)"
      (specialty)="openSpecialties($event)"
      [assignSpecialty]="true"
      (delete)="onDelete($event)">
    </app-table>

    <!-- MODAL -->
    <app-modal-container
      [title]=" mode === 'create' ? 'Nuevo Doctor' : mode === 'edit' ? 'Editar Doctor'  : 'Ver Doctor' "
      [open]="isModalOpen"
      (close)="isModalOpen = false">

    <app-form
      *ngIf="isModalOpen"
      [fields]="formFields"
      [data]="selectedDoctors"
      (submitForm)="onSave($event)"
      [mode]="mode">
    </app-form>

    </app-modal-container>

    <app-modal-container title="Asignar especialidades" 
    [open]="showSpecialtyModal" 
    (close)="showSpecialtyModal = false">
      <div class="p-2">
        <div class="bg-blue-50 rounded-xl p-4 mb-4 flex items-center gap-3">
          <div class="w-12 h-12 rounded-full bg-blue-600 text-white flex items-center justify-center">
            <i class="fa-solid fa-user-doctor text-xl"></i>
          </div>
          <div>
            <p class="text-xs text-gray-500">
              Doctor seleccionado
            </p>
            <h3 class="font-bold text-lg text-gray-800">
              {{selectedDoctorSpecialty?.doctor}}
            </h3>
          </div>
        </div>
    
        <div class="flex justify-between items-center mb-3">
          <span class="text-sm text-gray-500">
            Especialidades asignadas:
          </span>
          <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-semibold">
            {{selectedSpecialties.length}}
          </span>
        </div>
    
        <div id="scroll-modal" class="grid grid-cols-1 gap-3 max-h-[300px] overflow-y-auto">
          <label *ngFor="let s of specialties" class="cursor-pointer">
   
            <div class="flex items-center justify-between p-3 rounded-xl border transition" 
            [ngClass]="selectedSpecialties.includes(s.id)
            ? 'bg-blue-50 border-blue-400'
            : 'bg-white hover:bg-gray-50'
            ">

              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full flex items-center justify-center" 
                [ngClass]="selectedSpecialties.includes(s.id)
                ? 'bg-blue-600 text-white'
                : 'bg-gray-100 text-gray-500'
                ">
                  <i class="fa-solid fa-stethoscope"></i>
                </div>
    
                <span class="text-sm font-medium text-gray-700">
                  {{s.name.toUpperCase()}}
                </span>
              </div>
    
              <input type="checkbox" 
              [checked]="selectedSpecialties.includes(s.id)" 
              (change)="toggleSpecialty(s.id)"
              class="w-5 h-5 accent-blue-600">
            </div>
          </label>    
        </div>

        <div class="flex justify-center gap-3 mt-5">    
          <button class="px-5 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 shadow" 
          (click)="saveSpecialties()">
            Guardar
          </button>
        </div>
      </div>
    </app-modal-container>

    <app-alert-modal
      [isOpen]="showDeleteModal"
      [title]="getModalTitle()"
      [message]="getModalMessage()"
      [type]="doctorIdToDelete?.status === 'Activo' ? 'warning' : 'info'"
      (close)="showDeleteModal = false; doctorIdToDelete = null"
      (confirm)="confirmDelete()">
    </app-alert-modal>
  </div>
</div>
