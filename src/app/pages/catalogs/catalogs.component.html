<div class="h-full min-h-0 flex flex-col p-2 gap-2 overflow-hidden">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Catálogos del Sistema</h1>
        <app-button variant="primary" (click)="openCreate()">
            Nuevo Catálogo
        </app-button>
    </div>

    <div class="flex-1 min-h-0 overflow-y-auto">

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-1">

            <div *ngFor="let catalog of catalogsType"
                class="bg-white rounded-xl shadow-md hover:shadow-lg transition-all duration-300 catalog-card">

                <div class="p-5 border-b border-gray-100">
                    <div class="flex items-start justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
                                <i class="fas fa-folder text-blue-500 text-xl"></i>
                            </div>
                            <div>
                                <h2 class="text-lg font-semibold text-gray-800">
                                    {{ catalog.name }}
                                </h2>
                                <p class="text-xs text-gray-500">
                                    {{ catalog.totalItems }} items configurados
                                </p>
                            </div>
                        </div>
                        <button (click)="onEdit(catalog)"
                            class="text-gray-400 hover:text-blue-500 transition-colors duration-200 bg-white rounded-full w-8 h-8 flex items-center justify-center shadow-sm hover:bg-blue-50">
                            <i class="fas fa-pencil-alt text-sm"></i>
                        </button>
                    </div>
                </div>

                <div class="p-4 max-h-80 overflow-y-auto">
                    <div class="space-y-2">
                        <div *ngFor="let item of catalog.items"
                            class="flex items-center justify-between p-2 rounded-lg hover:bg-gray-50 transition group">

                            <span class="text-sm text-gray-700">{{ item.value }}</span>

                            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                <button (click)="onEditItem(catalog, item)"
                                    class="text-gray-400 hover:text-blue-500 transition">
                                    <i class="fas fa-pencil-alt text-xs"></i>
                                </button>
                                <button (click)="onDeleteItem(catalog, item)"
                                    class="text-gray-400 hover:text-red-500 transition">
                                    <i
                                        [class]="item.status === 'Activo' ? 'fas fa-trash-can text-sm' : 'fas fa-undo-alt text-sm'"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="p-4 border-t border-gray-100">
                    <button (click)="openCreateItem(catalog)"
                        class="w-full flex items-center justify-center gap-2 py-2 text-blue-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition font-medium text-sm">
                        <i class="fas fa-plus text-xs"></i>
                        Agregar
                    </button>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- MODAL CATALOG TYPE -->
<app-modal-container
    [title]="mode === 'create' ? 'Nuevo Catálogo' : 'Editar Catálogo'"
    [open]="showCatalogTypeModal"
    (close)="showCatalogTypeModal = false">

    <app-form
        *ngIf="showCatalogTypeModal"
        [fields]="catalogTypeFields"
        [data]="selectedCatalogType"
        (submitForm)="onSaveCatalogType($event)"
        [mode]="mode">
    </app-form>

</app-modal-container>

<!-- MODAL -->
<app-modal-container
    [title]="mode === 'create' ? 'Agregar Item' : 'Editar Item'"
    [open]="showItemModal"
    (close)="showItemModal = false">

    <app-form
        *ngIf="showItemModal"
        [fields]="catalogItemFields"
        [data]="selectedItem"
        (submitForm)="onSaveItem($event)"
        [mode]="mode">
    </app-form>

</app-modal-container>

<app-alert-modal
    [isOpen]="showDeleteModal"
    [title]="getModalTitle()"
    [message]="getModalMessage()"
    [type]="catalogIdToDelete?.status === 'Activo' ? 'warning' : 'info'"
    (close)="showDeleteModal = false; catalogIdToDelete = null"
    (confirm)="confirmDelete()">
</app-alert-modal>
