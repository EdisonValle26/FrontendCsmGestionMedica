<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Gestión de Citas</h1>
    <app-button variant="primary" (click)="openCreate()">
        Nueva Cita
    </app-button>
</div>

<!-- FILTROS -->
<app-filters
  [filters]="filtersConfig"
  (filterChange)="onFilter($event)">
</app-filters>

<!-- TABLA -->
<app-table
  [data]="appointments"
  [columns]="columns"
  [loading]="loading"
  [total]="totalAppointments"
  [page]="page"
  [take]="take"
  [takeOptions]="takeOptions"
  (pageChange)="onPageChange($event)"
  (takeChange)="onTakeChange($event)"
  (view)="onView($event)"
  (edit)="onEdit($event)"
  (delete)="onDelete($event)">
</app-table>

<!-- MODAL -->
<app-modal-container
  [title]=" mode === 'create' ? 'Nueva Cita' : mode === 'edit' ? 'Editar Cita'  : 'Ver Cita' "
  [open]="isModalOpen"
  (close)="isModalOpen = false">

<app-form
  *ngIf="isModalOpen"
  [fields]="formFields"
  [data]="selectedAppointments"
  (submitForm)="onSave($event)"
  (fieldChange)="onFieldChange($event)"
  [mode]="mode">
</app-form>

</app-modal-container>


<app-alert-modal
  [isOpen]="showDeleteModal"
  title="Eliminar Cita"
  message="¿Está seguro de eliminar esta Cita?"
  type="warning"
  (close)="showDeleteModal = false"
  (confirm)="confirmDelete()">
</app-alert-modal>
