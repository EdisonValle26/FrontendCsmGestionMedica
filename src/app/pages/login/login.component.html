<div class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="bg-white p-8 rounded shadow-md w-full max-w-md">

        <h2 class="text-2xl font-bold text-center mb-6">
            Iniciar Sesión
        </h2>

        <!-- Alerta -->
        <!-- <div *ngIf="showAlert" class="mb-4">
            <app-alert [type]="alertType" [message]="alertMessage">
            </app-alert>
        </div> -->

        <form (ngSubmit)="onLogin()" class="space-y-4">

            <input [(ngModel)]="email" name="email" type="email" placeholder="Correo"
                class="w-full p-3 border rounded" />

            <input [(ngModel)]="password" name="password" type="password" placeholder="Contraseña"
                class="w-full p-3 border rounded" />

            <app-button type="submit" variant="primary" customClass="w-full mt-4">
                Ingresar
            </app-button>

        </form>

    </div>

</div>
