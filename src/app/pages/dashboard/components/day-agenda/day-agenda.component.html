<div class="bg-white p-6 rounded-2xl shadow-sm border h-full min-h-0 flex flex-col overflow-hidden">

    <!-- HEADER -->
    <div class="mb-5 shrink-0">
        <h3 class="text-lg font-bold text-gray-800">
            Agenda del día
        </h3>

        <p class="text-sm text-gray-400">
            {{ appointments.length }} citas programadas
        </p>
    </div>

    <!-- EMPTY -->
    <div *ngIf="appointments.length === 0"
        class="flex-1 flex items-center justify-center text-gray-400 text-sm">

        No hay citas programadas para hoy

    </div>

    <!-- LIST -->
    <div *ngIf="appointments.length > 0"
        class="flex-1 min-h-0 overflow-y-auto pr-2 space-y-3">

        <div *ngFor="let appt of appointments"
            class="flex items-center gap-4 p-4 rounded-xl bg-gray-50 hover:bg-blue-50 border border-transparent hover:border-blue-200 transition">

            <!-- HORA -->
            <div class="min-w-16 text-center">
                <div class="text-xs font-bold text-blue-600 bg-blue-100 px-3 py-2 rounded-lg">
                    {{ appt.appointment_time }}
                </div>
            </div>

            <!-- INFO -->
            <div class="flex-1">
                <div class="text-sm font-semibold text-gray-800">
                    {{ appt.patient }}
                </div>

                <div class="text-xs text-gray-500 mt-1">
                    {{ appt.specialty_name }} · {{ appt.doctor }}
                </div>
            </div>

            <!-- STATUS -->
            <div class="text-xs font-semibold px-3 py-1 rounded-full border"
                [ngClass]="getStatusClass(appt.status_name)">

                {{ appt.status_name }}

            </div>

        </div>

    </div>

</div>
